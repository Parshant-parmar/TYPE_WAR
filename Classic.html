
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic mode</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 id="title">
TYPE WAR
</h1>

<div id="start">
<input id="setnum" type="range" min="30" max="120" step="30" value="30">
<p id="storeval"></p>
<button id="startbtn">Generate text</button>
</div>

<p id="maintext"></p>

<div id="popup">
<p id="w"></p>
<p id="acc"></p>
<p id="err"></p>
<p id="maxs"></p>
<button id="done">OK</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script type="module" src="first.js"></script>

<script>
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const title = document.querySelector("#title");
const originalText = title.innerText;
let iteration = 0;

function shuffleTitle(){

let interval = setInterval(()=>{

title.innerText = originalText
.split("")
.map((letter,index)=>{

if(index < iteration){
return originalText[index];
}

return letters[Math.floor(Math.random()*26)];

})
.join("");

iteration +=0.22;

if(iteration >= originalText.length){
clearInterval(interval);
}

},45);

}

shuffleTitle();

gsap.from("#title",{
y:-40,
opacity:0,
duration:1,
ease:"power3.out"
});
</script>

</body>
</html>
